<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Buttons</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        .header {
      position: fixed; /* Makes the header fixed */
      top: 0;
      left: 0;
      width: 100%; /* Full width of the page */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #ffffff; /* White background */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
      z-index: 1000; /* Ensures it stays on top */
    }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
            position: relative;
        }
        .button:hover {
            background-color: #e0e0e0;
        }
        .blue-mark {
            width: 10px;
            height: 10px;
            background-color: blue;
            border-radius: 50%;
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
        }
        .button.active .blue-mark {
            display: block;
        }
        .menu-icon {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .menu-icon .bar {
      width: 25px;
      height: 3px;
      background-color: #333; /* Dark bars for hamburger icon */
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 40px;
      height: 40px;
    }

    .site-title {
      font-size: 1.2em;
      margin: 0;
    }

    .site-tagline {
      font-size: 0.9em;
      color: #666; /* Subtle text color */
      margin: 0;
    }

    .icon-placeholder img {
      width: 30px;
      height: 30px;
    }

    .nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav ul li a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .nav ul li a:hover {
      color: #007bff; /* Highlight color on hover */
    }

    .cta-button .btn {
      text-decoration: none;
      padding: 8px 15px;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      font-weight: bold;
    }

    .cta-button .btn:hover {
      background-color: #0056b3;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -300px; /* Initially hidden */
      width: 300px;
      height: 100%;
      background-color: #333;
      color: white;
      transition: left 0.3s ease-in-out;
      z-index: 1001;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
    }

    .side-menu .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: white;
      margin-bottom: 20px;
    }

    .side-menu ul {
      list-style: none;
      padding: 0;
    }

    .side-menu ul li {
      margin: 15px 0;
    }

    .side-menu ul li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .side-menu ul li a:hover {
      color: #007bff;
    }

    /* Open Side Menu */
    .side-menu.open {
      left: 0; /* Slide into view */
    }

    /* Add some content below the header for scrolling */
    .content {
      padding-top: 100px; /* Space for the fixed header */
      padding: 20px;
    }
    </style>
</head>
<body>
    <header class="header">
       
        <div class="header-title">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACQAAAAkCAYAAADhAJiYAAAAAXNSR0IArs4c6QAAAc1JREFUWEftl4FNxDAMRX2TcEwCTHIwCTAJxyTAJLAJ9J0aybRO4h9AVIhI1VVqGr/+7zi+nW1s7DbGY38KaG9m12Z2YWaX0/2bu+7ne9mAUYUAeGpEA+5xen6nEo0AEeQ2GQilJCgVaKkMShD0OF1YyPUw/8LM85vJ0ufkB8hJjU1AMQhyFQQqUGUeUOc/BfTuFiYIwaIB1Gty7qf3FcvYUdjBwCKsaA2vJkqmbFOAfDJnklWdf/o4BcgndC1/vGKoiaoM1ETV7lCAfF6QO9jwqznE12V2mTJvpZiiEC8vd4+vM1Ed4p10Qqs5VL5mU5W6QJGsHB+oEg25QpdFVMt88Npp/zJNks4vv+hXgLpbeGTCCBDKUJNqdsFRygG/qQo9Yhk2HDogtXxK90YZhZZbfcSJolqrmJ7W7QHVOsPSEdbgzmYlSwtS5nU7yRZQBJM5VKOd6DvMZkloAdHPlMQdriszHetw7Pj1wqatBuR7H7n8V3xc5mLYAdSAvDqqTa2k98dO2NrWgHyr2kt8ZdctVVodvFEwb1emEVOAmOtbmJVtPaBM76wCNVvbCGioFxaoZCDqj//vJZ1FCbDm+t+ZsAmW/pR/oJ5Gm1PoAws+biVEOolCAAAAAElFTkSuQmCC" alt="Logo" class="logo-img">
          <div>
            <h1 class="site-title">Agent Connection Hub</h1>
            <p class="site-tagline">Connecting Agents and Opportunities</p>
          </div>
        </div>
        </header>
        
    <div class="button-container">
        <button class="button" onclick="handleClick(this, 'C:/Users/arunn/OneDrive/Desktop/capstone/new/cap3/client/login.html')">
            <span class="blue-mark"></span>
            User Login
        </button>
        <button class="button" onclick="handleClick(this, 'C:/Users/arunn/OneDrive/Desktop/capstone/new/cap3/client/login2.html')">
            <span class="blue-mark"></span>
            Admin Login
        </button>
    </div>

    <script>
        function handleClick(button, url) {
            // Remove active class from all buttons
            document.querySelectorAll('.button').forEach(btn => {
                btn.classList.remove('active');
            });
            // Add active class to the clicked button
            button.classList.add('active');
            // Redirect to the specified URL after a short delay
            setTimeout(() => {
                window.location.href = url;
            }, 200);
        }
    </script>
</body>
</html>
