  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      position: fixed; /* Makes the header fixed */
      top: 0;
      left: 0;
      width: 100%; /* Full width of the page */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #ffffff; /* White background */
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
      z-index: 1000; /* Ensures it stays on top */
    }

    .menu-icon {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .menu-icon .bar {
      width: 25px;
      height: 3px;
      background-color: #333; /* Dark bars for hamburger icon */
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 40px;
      height: 40px;
    }

    .site-title {
      font-size: 1.2em;
      margin: 0;
    }

    .site-tagline {
      font-size: 0.9em;
      color: #666; /* Subtle text color */
      margin: 0;
    }

    .icon-placeholder img {
      width: 30px;
      height: 30px;
    }

    .nav ul {
      display: flex;
      gap: 20px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav ul li a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .nav ul li a:hover {
      color: #007bff; /* Highlight color on hover */
    }

    .cta-button .btn {
      text-decoration: none;
      padding: 8px 15px;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      font-weight: bold;
    }

    .cta-button .btn:hover {
      background-color: #0056b3;
    }

    .side-menu {
      position: fixed;
      top: 0;
      left: -300px; /* Initially hidden */
      width: 300px;
      height: 100%;
      background-color: #333;
      color: white;
      transition: left 0.3s ease-in-out;
      z-index: 1001;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
    }

    .side-menu .close-btn {
      font-size: 24px;
      cursor: pointer;
      color: white;
      margin-bottom: 20px;
    }

    .side-menu ul {
      list-style: none;
      padding: 0;
    }

    .side-menu ul li {
      margin: 15px 0;
    }

    .side-menu ul li a {
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .side-menu ul li a:hover {
      color: #007bff;
    }

    /* Open Side Menu */
    .side-menu.open {
      left: 0; /* Slide into view */
    }

    /* Add some content below the header for scrolling */
    .content {
      padding-top: 100px; /* Space for the fixed header */
      padding: 20px;
    }
  </style>

  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="w-50">
      <h2 class="text-center mb-4">Post a Job</h2>
      <form id="jobForm">
        <div class="form-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" class="form-control" placeholder="Enter company name" required>
        </div>
        <div class="form-group">
          <label for="title">Job Title</label>
          <input type="text" id="title" class="form-control" placeholder="Enter job title" required>
        </div>
        <div class="form-group">
          <label for="description">Job Description</label>
          <textarea id="description" class="form-control" rows="5" placeholder="Enter job description" required></textarea>
        </div>
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" class="form-control" placeholder="Enter job location" required>
        </div>
        <div class="form-group">
          <label for="skills">Required Skills</label>
          <input type="text" id="skills" class="form-control" placeholder="e.g., Java, Python, SQL" required>
        </div>
        <div class="form-group">
          <label for="salary">Salary</label>
          <input type="number" id="salary" class="form-control" placeholder="Enter salary in USD" required>
        </div>
        <div class="form-group">
          <label for="date">Interview Date</label>
          <input type="text" id="date" class="form-control" placeholder="Enter date" required>
        </div>
        <div class="form-group">
          <label for="type">Interview Type</label>
          <select id="type" class="form-control" required>
            <option value="" disabled selected>Select interview type</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Post Job</button>
      </form>
      <br></br>
      <br></br>
      <br></br>
    </div>
  </div>
  
  <script>
    document.getElementById('jobForm').addEventListener('submit', async function (event) {
      event.preventDefault();

      const payload = {
        
        company: document.getElementById('company').value,
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        location: document.getElementById('location').value,
        skills: document.getElementById('skills').value,
        salary: document.getElementById('salary').value,
        date: document.getElementById('date').value,
        type: document.getElementById('type').value
      };

      try {
        const response = await fetch('http://localhost:3001/api/postJob', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.text();
        if (response.ok) {
          alert('Job successfully posted!');
          window.location.href = 'dashboard1.html';
        } else {
          alert('Error: ' + result);
        }
      } catch (error) {
        alert('Error posting job. Please try again later.');
      }
    });
  </script>
